name: Fetch Connections Puzzle

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v3

      - name: Download puzzle
        run: |
          DATE=$(date +%F)
          curl https://www.nytimes.com/svc/connections/v2/$DATE.json -o puzzle.json

      - name: Commit puzzle
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add puzzle.json
          git commit -m "update puzzle"
          git push

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description"
content="Find definitions and hints for today's Connections puzzle. A fast tool to help solve the daily word puzzle.">
<title>Connections Solver</title>
 <title>Connections Solver & Word Definition Helper</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
 <h2 id="title"></h2>

<script>
const today = new Date();

const formatted = today.toLocaleDateString("en-US", {
  month: "long",
  day: "numeric"
});

document.getElementById("title").textContent =
  "Connections Hint Definition Helper for " + formatted;
</script>
 <h3>Click any hint to view its definition</h3> 

<div id="grid" class="grid"></div>


<div id="panel" class="panel">

  <div class="panel-header">
    <h2 id="wordTitle"></h2>
    <button onclick="closePanel()">Close</button>
  </div>

  <div id="definition" class="panel-content"></div>

</div>
<script src="app.js"></script>

</body>
</html>
